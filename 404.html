<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — NFUA Advocacy Toolkit</title>
  <link rel="stylesheet" href="/nfua-toolkit/shared.css" />
  <style>
    .coming-soon-wrap {
      min-height: calc(100vh - 58px - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .coming-soon-card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .coming-soon-icon {
      width: 64px;
      height: 64px;
      background: #f0f7f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .coming-soon-icon svg {
      width: 32px;
      height: 32px;
      color: #2A9D8F;
    }
    .coming-soon-card h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: #1B3A5C;
      margin-bottom: 12px;
    }
    .coming-soon-card p {
      font-size: 0.97rem;
      color: #555;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-back {
      display: inline-block;
      background: #2A9D8F;
      color: #fff;
      border-radius: 6px;
      padding: 12px 28px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-back:hover { background: #238a7e; }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="/nfua-toolkit/" class="logo">NFUA <span>Advocacy Toolkit</span></a>
    <a href="/nfua-toolkit/" class="back">← Back to Toolkit</a>
  </nav>

  <div class="coming-soon-wrap">
    <div class="coming-soon-card">
      <div class="coming-soon-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <h1>Coming Soon</h1>
      <p>This content is being prepared and will be available shortly. Check back soon for updates.</p>
      <a href="/nfua-toolkit/" class="btn-back">← Return to Toolkit</a>
    </div>
  </div>

  <footer class="site-footer">
    Neighbors for a United Atlanta &nbsp;|&nbsp;
    <a href="https://neighborsforaunitedatlanta.com">neighborsforaunitedatlanta.com</a>
  </footer>
</body>
</html>
